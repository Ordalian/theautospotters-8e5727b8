<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Zone de Jeu</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0e1225;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;width:100vw;font-family:'Inter',sans-serif;
    overflow:hidden;
  }
  .card{
    width:100vw;height:100vh;border-radius:0;
    background:#12172e;position:relative;overflow:hidden;
    box-shadow:none;
  }
  .grid{
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(0,180,255,0.055) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,180,255,0.055) 1px,transparent 1px);
    background-size:28px 28px;
  }
  .laser{position:absolute;top:0;height:100%;width:1.5px;opacity:0.3;}
  .l1{left:26%;background:linear-gradient(to bottom,transparent 5%,#ff00ff 50%,transparent 95%);animation:lp 4s infinite;}
  .l2{left:63%;background:linear-gradient(to bottom,transparent 5%,#00e5ff 50%,transparent 95%);animation:lp 4s 2s infinite;}
  @keyframes lp{0%,100%{opacity:0.18}50%{opacity:0.5}}
  .lh{position:absolute;left:0;width:100%;height:1.5px;bottom:36%;background:linear-gradient(to right,transparent,#ff00ff 30%,#00e5ff 70%,transparent);opacity:0.28;}
  .ground{position:absolute;left:0;right:0;height:2px;bottom:68px;background:linear-gradient(to right,transparent,#ff00ff 20%,#00e5ff 80%,transparent);opacity:0.48;}
  .scanlines{position:absolute;inset:0;pointer-events:none;z-index:50;border-radius:18px;background:repeating-linear-gradient(to bottom,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 3px);}
  .corner{position:absolute;width:13px;height:13px;border-color:#00ffff;border-style:solid;opacity:0.38;}
  .tl{top:9px;left:9px;border-width:1.5px 0 0 1.5px}
  .tr{top:9px;right:9px;border-width:1.5px 1.5px 0 0}
  .bl{bottom:9px;left:9px;border-width:0 0 1.5px 1.5px}
  .br{bottom:9px;right:9px;border-width:0 1.5px 1.5px 0}

  .card-label{
    position:absolute;bottom:0;left:0;right:0;padding:10px 13px;
    background:linear-gradient(to top,rgba(8,10,25,0.97) 55%,transparent);
    z-index:60;
  }
  .card-label h3{font-weight:700;font-size:13px;color:#fff;margin-bottom:2px;text-shadow:0 1px 4px rgba(0,0,0,0.9);}
  .card-label p{font-size:10px;color:rgba(255,255,255,0.45);font-weight:400;}

  .seq{position:absolute;inset:0;display:none;}
  .seq.active{display:block;}

  .car-wrap{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
  .car-wrap.falling{top:-220px;animation:fall 1.1s cubic-bezier(0.22,0.61,0.36,1) forwards;}
  @keyframes fall{
    0%  {top:-220px;transform:translateX(-50%) rotate(-6deg);}
    78% {top:106px;transform:translateX(-50%) rotate(2.5deg);}
    88% {top:100px;transform:translateX(-50%) rotate(-1deg);}
    100%{top:103px;transform:translateX(-50%) rotate(0);}
  }
  .car-shadow{
    position:absolute;left:50%;transform:translateX(-50%);
    width:210px;height:12px;bottom:68px;opacity:0;
    background:radial-gradient(ellipse,rgba(0,0,0,0.85)0%,transparent 68%);
  }
  .scan-bar{
    position:absolute;left:4%;width:92%;height:3px;z-index:20;opacity:0;top:100px;
    background:linear-gradient(to right,transparent,#00ffff 18%,#fff 50%,#00ffff 82%,transparent);
    box-shadow:0 0 14px #00ffff,0 0 28px rgba(0,255,255,0.35);
  }
  .scan-txt{
    position:absolute;top:16px;left:50%;transform:translateX(-50%);
    color:#00ffff;font-family:'Press Start 2P',monospace;font-size:4.5px;
    letter-spacing:1.5px;text-shadow:0 0 8px #00ffff;opacity:0;white-space:nowrap;
  }
  .car8{position:absolute;bottom:58px;left:-320px;image-rendering:pixelated;}
  #sl{position:absolute;inset:0;pointer-events:none;opacity:0;}
  .spd{position:absolute;height:1.5px;right:0;background:linear-gradient(to right,transparent,rgba(255,255,255,0.85));}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="grid"></div>
  <div class="laser l1"></div><div class="laser l2"></div>
  <div class="lh"></div><div class="ground"></div>
  <div class="scanlines"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>

  <!-- ═══════════════════════════════════ -->

        <rect x="110" y="32" width="3"   height="3"  fill="#00ffaa" opacity="0.7"/>
        <rect x="196" y="28" width="3"   height="3"  fill="#00ddff" opacity="0.7"/>
      </svg>
    </div>
  </div>

  <div id="sl">
    <div class="spd" style="top:33%;width:155px;"></div>
    <div class="spd" style="top:41%;width:125px;"></div>
    <div class="spd" style="top:49%;width:175px;"></div>
    <div class="spd" style="top:57%;width:140px;"></div>
    <div class="spd" style="top:63%;width:105px;"></div>
  </div>

  <div class="card-label">
    <h3>Zone de jeu</h3>
    <p>Défis et jeux</p>
  </div>
</div>

<script>
let timers=[];
function T(fn,d){timers.push(setTimeout(fn,d));}
function clearAll(){timers.forEach(clearTimeout);timers=[];}

function startSeq(idx){
  clearAll();
  for(let i=0;i<3;i++) document.getElementById('s'+i).classList.remove('active');
  const seq=document.getElementById('s'+idx);
  const car=document.getElementById('c'+idx);
  const sc=document.getElementById('sc'+idx);
  const st=document.getElementById('st'+idx);
  const c8=document.getElementById('c8_'+idx);
  const sh=document.getElementById('sh'+idx);
  const sl=document.getElementById('sl');

  seq.classList.add('active');
  car.style.cssText='animation:none;top:-220px;opacity:1;position:absolute;left:50%;transform:translateX(-50%);text-align:center;';
  c8.style.cssText='bottom:58px;left:-320px;opacity:1;position:absolute;image-rendering:pixelated;transition:none;';
  sc.style.cssText='position:absolute;left:4%;width:92%;height:3px;z-index:20;opacity:0;top:100px;background:linear-gradient(to right,transparent,#00ffff 18%,#fff 50%,#00ffff 82%,transparent);box-shadow:0 0 14px #00ffff,0 0 28px rgba(0,255,255,0.35);';
  st.style.opacity='0';
  sh.style.opacity='0';
  sl.style.cssText='position:absolute;inset:0;pointer-events:none;opacity:0;';

  // Fall
  T(()=>{ car.style.animation='fall 1.1s cubic-bezier(0.22,0.61,0.36,1) forwards'; },300);
  T(()=>{ sh.style.cssText='position:absolute;left:50%;transform:translateX(-50%);width:210px;height:12px;bottom:68px;opacity:1;transition:opacity 0.6s;background:radial-gradient(ellipse,rgba(0,0,0,0.85)0%,transparent 68%);'; },740);

  // Impact shake
  T(()=>{
    const card=document.getElementById('card');
    [['-3px','5px'],['5px','-4px'],['-3px','3px'],['3px','-2px'],['0','0']].forEach(([x,y],i)=>T(()=>{card.style.transform=`translate(${x},${y})`;},i*55));
    burst(idx,seq);
    smokePuffs(idx,seq);
  },1380);

  // Scan sweep
  T(()=>{
    st.style.cssText='position:absolute;top:16px;left:50%;transform:translateX(-50%);color:#00ffff;font-family:\'Press Start 2P\',monospace;font-size:4.5px;letter-spacing:1.5px;text-shadow:0 0 8px #00ffff;opacity:1;transition:opacity 0.3s;white-space:nowrap;';
    sc.style.opacity='1';
    T(()=>{ sc.style.cssText+=';transition:top 0.88s linear;'; sc.style.top='290px'; },40);
  },2040);

  // Flicker → 8-bit drives in from LEFT
  T(()=>{
    sc.style.opacity='0';
    st.style.opacity='0';
    let f=0;
    const fi=setInterval(()=>{
      f++;
      car.style.opacity=f%2===0?'0':'1';
      c8.style.cssText='bottom:58px;left:26px;opacity:'+(f%2===0?'1':'0')+';position:absolute;image-rendering:pixelated;transition:none;';
      if(f>=7){
        clearInterval(fi);
        car.style.opacity='0';
        c8.style.cssText='bottom:58px;left:26px;opacity:1;position:absolute;image-rendering:pixelated;';
      }
    },115);
  },3000);

  // 8-bit EXITS to the LEFT
  T(()=>{
    sl.style.cssText='position:absolute;inset:0;pointer-events:none;opacity:1;transition:opacity 0.1s;';
    c8.style.cssText='bottom:58px;left:-380px;opacity:1;position:absolute;image-rendering:pixelated;transition:left 0.62s cubic-bezier(0.55,0,1,0.45);';
    sh.style.opacity='0';
  },4500);

  T(()=>{
    sl.style.opacity='0';
    seq.classList.remove('active');
    T(()=>startSeq((idx+1)%3),600);
  },5450);
}

function burst(idx,seq){
  const p=[
    ['#cc88ff','#ff44ff','#00ffff','#ffff00','#ffffff'],
    ['#ff44aa','#00ffff','#ffffff','#ff88ff','#ffff44'],
    ['#cc0000','#ff6600','#ffaa00','#00ffff','#ff88ff']
  ][idx];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');
    const s=3+Math.random()*10;
    el.style.cssText=`position:absolute;width:${s}px;height:${s}px;background:${p[Math.floor(Math.random()*p.length)]};left:${26+Math.random()*48}%;top:112px;border-radius:1px;opacity:1;transition:all 0.9s ease-out;z-index:15;`;
    seq.appendChild(el);
    T(()=>{ el.style.left=(10+Math.random()*80)+'%'; el.style.top=(28+Math.random()*58)+'%'; el.style.opacity='0'; T(()=>el.remove(),1000); },20+Math.random()*80);
  }
}

function smokePuffs(idx,seq){
  const d=document.createElement('div');
  d.style.cssText='position:absolute;left:50%;transform:translateX(-50%);bottom:170px;pointer-events:none;z-index:16;';
  d.innerHTML='<svg width="170" height="52" viewBox="0 0 170 52">'+
    '<circle cx="60" cy="42" r="0" fill="rgba(255,255,255,0.82)" id="q0"/>'+
    '<circle cx="82" cy="46" r="0" fill="rgba(255,255,255,0.68)" id="q1"/>'+
    '<circle cx="104" cy="41" r="0" fill="rgba(255,255,255,0.56)" id="q2"/>'+
    '<circle cx="70" cy="30" r="0" fill="rgba(255,255,255,0.44)" id="q3"/>'+
    '<circle cx="94" cy="34" r="0" fill="rgba(255,255,255,0.36)" id="q4"/>'+
  '</svg>';
  seq.appendChild(d);
  [24,19,21,15,17].forEach((r,i)=>T(()=>{
    const el=d.querySelector('#q'+i);
    if(el){el.setAttribute('r',r);el.style.transition=`r 0.5s ease-out ${i*0.07}s,opacity 0.72s ease-out ${i*0.07+0.1}s`;el.style.opacity='0';}
  },65));
  T(()=>d.remove(),1300);
}

startSeq(0);
</script>
</body>
</html>
